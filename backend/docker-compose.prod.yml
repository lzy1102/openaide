version: '3.8'

# 生产环境 Docker Compose 配置
# Usage: docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  openaide:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - VERSION=${VERSION:-latest}
    image: openaide:${VERSION:-latest}
    restart: always
    environment:
      - GIN_MODE=release
      - PORT=19375
      - TZ=Asia/Shanghai
      # 通过环境变量配置 API Keys (推荐方式)
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - QWEN_API_KEY=${QWEN_API_KEY:-}
      - GLM_API_KEY=${GLM_API_KEY:-}
      - OPENAIDE_LOCAL_MODE=${OPENAIDE_LOCAL_MODE:-false}
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
      replicas: 1
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:19375/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Nginx 反向代理 (可选)
  nginx:
    image: nginx:alpine
    container_name: openaide-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - openaide
    networks:
      - openaide-network
    profiles:
      - nginx
